version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: demo-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: demo

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - demo-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sa -d demo"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/wiratatwork/basic-app-backend:prod
    container_name: demo-api
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5001

      ConnectionStrings__DefaultConnection: ${DB_CONNECTION}

      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: BasicApp
      Jwt__Audience: BasicApp
      Jwt__AccessTokenExpiryMinutes: 15
      Jwt__RefreshTokenSlidingDays: 7

      Jwt__RefreshCookieName: refresh_token
      Jwt__RefreshCookiePath: /api/auth
      Jwt__RefreshCookieSecure: "true"

    ports:
      - "127.0.0.1:5001:5001"

    networks:
      - demo-network

  frontend:
    image: ghcr.io/wiratatwork/basic-app-frontend:prod
    container_name: demo-frontend
    restart: unless-stopped

    depends_on:
      - api

    ports:
      - "127.0.0.1:4200:80"

    networks:
      - demo-network

volumes:
  postgres_data:

networks:
  demo-network:
    driver: bridge