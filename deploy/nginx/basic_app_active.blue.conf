# Nginx config for BLUE slot (active)
# กำหนด upstream สำหรับ frontend และ API ของ slot blue
upstream basic_app_frontend_active {
    server 127.0.0.1:4201;
    keepalive 32;
}

upstream basic_app_api_active {
    server 127.0.0.1:5001;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    # เส้นทาง /api/ จะ proxy ไปยัง backend API บน port 5001
    location /api/ {
        proxy_pass http://basic_app_api_active/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # เส้นทางอื่น ๆ จะ proxy ไปยัง frontend app บน port 4201
    location / {
        proxy_pass http://basic_app_frontend_active;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
