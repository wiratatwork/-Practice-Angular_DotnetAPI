name: CI/CD - Build & Push to GHCR (main branch)

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "backend.Tests/**"
      - "docker-compose.prod.yml"
      - "scripts/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci.yml

  build-and-push:
    name: Build & Push Docker Images (prod)
    needs: ci
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      push_images: true
      deployment_target: prod
    secrets: inherit

  trivy-scan:
    name: Trivy Image Scan
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/basic-app-backend:prod
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/basic-app-frontend:prod
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

  deploy-prod:
    name: Deploy to Production
    needs: [build-and-push, trivy-scan]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PROD_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Copy deploy script to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: scripts/deploy-prod.sh
          target: ~/basic_app/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/basic_app
            mkdir -p scripts
            chmod +x scripts/deploy-prod.sh

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u "${{ secrets.GHCR_USERNAME }}" \
              --password-stdin

            ./scripts/deploy-prod.sh

  smoke-test:
    name: Smoke Test Production
    needs: deploy-prod
    runs-on: ubuntu-latest

    steps:
      - name: Smoke test via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          script: |
            curl -fsS http://127.0.0.1:5001/health
            curl -fsS http://127.0.0.1:4200/
