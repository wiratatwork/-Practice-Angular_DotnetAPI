name: CI/CD - Build & Push to GHCR (test branch)

on:
  push:
    branches:
      - test
    paths:
      - "backend/**"
      - "frontend/**"
      - "backend.Tests/**"
      - "docker-compose.test.yml"
      - ".github/workflows/**"

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci.yml

  build-and-push:
    name: Build & Push Docker Images
    needs: ci
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      push_images: true
      deployment_target: test
    secrets: inherit

  trivy-scan:
    name: Trivy Image Scan (test)
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan backend image (test)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/basic-app-backend:test
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      - name: Scan frontend image (test)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/basic-app-frontend:test
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
