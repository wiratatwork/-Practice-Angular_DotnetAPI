name: CI/CD - Build & Push to GHCR (test branch)

on:
  push:
    branches:
      - test
    paths:
      - "backend/**"
      - "frontend/**"
      - "backend.Tests/**"
      - "docker-compose.test.yml"
      - ".github/workflows/**"
  pull_request:
    branches:
      - test
    paths:
      - "backend/**"
      - "frontend/**"
      - "backend.Tests/**"
      - "docker-compose.test.yml"
      - ".github/workflows/**"

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci.yml

  build-and-push:
    name: Build & Push Docker Images
    needs: ci
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-build-push.yml
    with:
      push_images: ${{ github.event_name == 'push' }}
      deployment_target: test
    secrets: inherit
