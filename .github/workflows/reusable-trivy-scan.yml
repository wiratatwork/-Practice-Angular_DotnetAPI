name: Reusable Trivy Scan

on:
  workflow_call:
    inputs:
      image_tag:
        type: string
        required: true
        description: "Docker image tag to scan (test or prod)"
      job_name:
        type: string
        required: false
        default: Trivy Image Scan

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  TRIVY_SEVERITY: CRITICAL,HIGH
  TRIVY_IGNORE_UNFIXED: true
  TRIVY_EXIT_CODE: 1

jobs:
  trivy-scan:
    name: ${{ inputs.job_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/basic-app-backend:${{ inputs.image_tag }}
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: ${{ env.TRIVY_IGNORE_UNFIXED }}
          exit-code: ${{ env.TRIVY_EXIT_CODE }}

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/basic-app-frontend:${{ inputs.image_tag }}
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: ${{ env.TRIVY_IGNORE_UNFIXED }}
          exit-code: ${{ env.TRIVY_EXIT_CODE }}
