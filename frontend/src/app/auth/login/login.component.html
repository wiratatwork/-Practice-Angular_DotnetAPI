<div class="flex min-h-screen items-center justify-center bg-gradient-to-br from-blue-50 via-slate-100 to-slate-200 p-4 sm:p-6">
    <div class="w-full max-w-md rounded-2xl bg-white p-6 sm:p-8 shadow-[0_10px_40px_rgba(0,0,0,0.1)]">
        <div class="mb-6 text-center">
            <h1 class="mb-2 text-2xl font-bold text-slate-800">Machine Management</h1>
            <p class="m-0 text-sm text-slate-500">เข้าสู่ระบบเพื่อใช้งาน</p>
        </div>

        @if (errorMessage()) {
        <div class="alert alert-error" role="alert">
            <ng-icon class="alert-icon icon-inline" [name]="icons.close" aria-hidden="true" />
            {{ errorMessage() }}
        </div>
        }

        <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
            <div class="form-group">
                <label for="username" class="form-label">
                    ชื่อผู้ใช้ <span class="required">*</span>
                </label>
                <input id="username" type="text" class="form-input" [class.input-error]="isInvalid('username')"
                    formControlName="username" placeholder="กรอกชื่อผู้ใช้" maxlength="50" autocomplete="username" />
                @if (hasError('username', 'required')) {
                <span class="error-msg">กรุณากรอกชื่อผู้ใช้</span>
                }
            </div>

            <div class="form-group">
                <label for="password" class="form-label">
                    รหัสผ่าน <span class="required">*</span>
                </label>
                <input id="password" type="password" class="form-input" [class.input-error]="isInvalid('password')"
                    formControlName="password" placeholder="กรอกรหัสผ่าน" maxlength="100"
                    autocomplete="current-password" />
                @if (hasError('password', 'required')) {
                <span class="error-msg">กรุณากรอกรหัสผ่าน</span>
                }
            </div>

            <button type="submit" class="btn btn-primary btn-block" [disabled]="isSubmitting()">
                @if (isSubmitting()) {
                <span class="spinner-sm"></span>
                กำลังเข้าสู่ระบบ...
                } @else {
                เข้าสู่ระบบ
                }
            </button>
        </form>

        <div class="mt-6 border-t border-slate-200 pt-5 text-center text-xs text-slate-500">
            <p class="my-1"><strong class="text-slate-600">Admin:</strong> admin / Admin@1234</p>
            <p class="my-1"><strong class="text-slate-600">User:</strong> user / User@1234</p>
        </div>
    </div>
</div>
