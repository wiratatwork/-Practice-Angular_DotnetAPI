<div class="login-page">
    <div class="login-card">
        <div class="login-header">
            <h1>Machine Management</h1>
            <p>เข้าสู่ระบบเพื่อใช้งาน</p>
        </div>

        @if (errorMessage()) {
        <div class="alert alert-error" role="alert">
            <span class="alert-icon">✕</span> {{ errorMessage() }}
        </div>
        }

        <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
            <div class="form-group">
                <label for="username" class="form-label">
                    ชื่อผู้ใช้ <span class="required">*</span>
                </label>
                <input id="username" type="text" class="form-input" [class.input-error]="isInvalid('username')"
                    formControlName="username" placeholder="กรอกชื่อผู้ใช้" maxlength="50" autocomplete="username" />
                @if (hasError('username', 'required')) {
                <span class="error-msg">กรุณากรอกชื่อผู้ใช้</span>
                }
            </div>

            <div class="form-group">
                <label for="password" class="form-label">
                    รหัสผ่าน <span class="required">*</span>
                </label>
                <input id="password" type="password" class="form-input" [class.input-error]="isInvalid('password')"
                    formControlName="password" placeholder="กรอกรหัสผ่าน" maxlength="100"
                    autocomplete="current-password" />
                @if (hasError('password', 'required')) {
                <span class="error-msg">กรุณากรอกรหัสผ่าน</span>
                }
            </div>

            <button type="submit" class="btn btn-primary btn-block" [disabled]="isSubmitting()">
                @if (isSubmitting()) {
                <span class="spinner-sm"></span>
                กำลังเข้าสู่ระบบ...
                } @else {
                เข้าสู่ระบบ
                }
            </button>
        </form>

        <div class="login-hint">
            <p><strong>Admin:</strong> admin / Admin@1234</p>
            <p><strong>User:</strong> user / User@1234</p>
        </div>
    </div>
</div>
